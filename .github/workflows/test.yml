name: build run test

on:
  push:
    branches: [ main, enhance ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: install dependencies
      run: sudo apt install -y libbenchmark-dev libgtest-dev libcjson-dev doxygen
    - name: Checkout code
      uses: actions/checkout@v2
    - name: make clean
      run: make clean
    - name: make
      run: make
    - name: make example
      run: make example
    - name: run example
      run: ./build/example/example
    - name: build and run tests
      run: make test
    - name: run individual tests
      run: |
        cd test
        make run-unit
        make run-enhanced
        make run-empty-array
    - name: generate documentation
      run: make doxygen

  sanitizer:
    runs-on: ubuntu-latest

    steps:
    - name: install dependencies
      run: sudo apt install -y libgtest-dev
    - name: Checkout code
      uses: actions/checkout@v2
    - name: build with sanitizers
      run: JSON_SANITIZE=1 make
    - name: run tests with sanitizers
      env:
        ASAN_OPTIONS: detect_leaks=0:abort_on_error=1
        UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
      run: JSON_SANITIZE=1 make test

  windows-msvc:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Configure with CMake (MSVC)
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release
    - name: Build
      run: cmake --build build --config Release
    - name: Run tests
      run: ctest --test-dir build -C Release --output-on-failure
    - name: Verify binary runs
      run: build\Release\json-gen-c.exe --version
    - name: Test code generation
      run: |
        mkdir testout
        build\Release\json-gen-c.exe -in test\test.json-gen-c -out testout
      shell: cmd

  windows-mingw:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up MSYS2 MinGW64
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-python
    - name: Configure with CMake (MinGW)
      run: cmake -S . -B build-mingw -G Ninja -DCMAKE_BUILD_TYPE=Release
      shell: msys2 {0}
    - name: Build
      run: cmake --build build-mingw
      shell: msys2 {0}
    - name: Run tests
      run: ctest --test-dir build-mingw --output-on-failure
      shell: msys2 {0}
    - name: Verify binary runs
      run: ./build-mingw/json-gen-c.exe --version
      shell: msys2 {0}
    - name: Test code generation
      run: |
        mkdir testout
        ./build-mingw/json-gen-c.exe -in test/test.json-gen-c -out testout
      shell: msys2 {0}

